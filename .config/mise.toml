[settings]
activate_aggressive  = true
all_compile          = false
env_shell_expand     = true
gpg_verify           = true
raw                  = true
status.missing_tools = "always"

# NodeJS settings
node.compile        = false
npm.package_manager = "pnpm"

# Generic config — applies to every environment (dev + ci). Environment-specific
# tools live in mise.dev.toml (MISE_ENV=dev, the maintainer's machine) and
# mise.ci.toml (MISE_ENV=ci, the GitHub workflows). Only the common runtime that
# both need (node, pnpm) lives here, to avoid duplicating it across both.
[tools]
node        = { version = "latest" }
osv-scanner = { version = "latest" }
pnpm        = { version = "latest" }

[env]
DISABLE_TELEMETRY = 1
_.path            = { path = "node_modules/.bin", tools = true }

[tasks.init]
description = "Initialize mise tasks"
hide        = true
run         = "find .config/mise/tasks/ -name '*' -type f -exec chmod 755 {} \\;"
