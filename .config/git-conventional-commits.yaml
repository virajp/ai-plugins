---
convention:
  commitTypes:
    - spec
    - ops
    - docs
    - merge
    - feat
    - fix
    - refactor

changelog:
  commitTypes:
    - feat
    - fix
    - refactor
  includeInvalidCommits: false
  commitIgnoreRegexPattern: '^[wW][iI][pP]\b'
  headlines:
    feat: Features
    fix: Bug Fixes
    perf: Performance Improvements
    merge: Merges
    breakingChange: BREAKING CHANGES

  # GitHub
  commitUrl: https://github.com/virajp/ai-plugins/commit/%commit%
  commitRangeUrl: https://github.com/virajp/ai-plugins/compare/%from%...%to%?diff=split

  # GitHub Issues
  issueRegexPattern: "#[0-9]+"
  issueUrl: https://github.com/virajp/ai-plugins/issues/%issue%
