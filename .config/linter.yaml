# @askviraj/linter configuration
#
# Add custom ignores, rule overrides, and additional config blocks below.

version: 1

ignores:
  - "**/archived/**"
  # vwf blueprint templates + example bundle carry OKF frontmatter (a `title`)
  # alongside a body H1; the linter counts the frontmatter title as an H1, so
  # exclude these template/example docs from markdown linting.
  - "plugins/vwf/assets/templates/**"
  - "plugins/vwf/assets/examples/**"

overrides:
  markdown:
    rules:
      markdown/no-reversed-media-syntax: off
