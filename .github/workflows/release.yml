name: Release

# Publishes @askviraj/ai-plugins to npm. Triggered three ways:
#   1. a pushed version tag (v*)   — the normal manual release path
#   2. workflow_dispatch           — manual re-publish of whatever is on the ref
#   3. workflow_call               — invoked by deps-update.yml after it cuts the
#                                    monthly patch release
# Auth is OIDC "trusted publishing" (no stored token) — npm verifies this repo +
# workflow's GitHub identity and adds provenance automatically. npm allows only
# ONE Trusted Publisher per package, and OIDC's job_workflow_ref resolves to THIS
# file even when it is called from deps-update.yml — so the single Trusted
# Publisher (release.yml) authorizes both paths. One-time setup: on npmjs.com add
# this repo + `release.yml` as the package's Trusted Publisher. To release
# manually: bump the version, then push a matching tag (e.g. v1.2.0).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}
  workflow_call:
    inputs:
      ref:
        description: "Git ref (tag) to check out and publish"
        required: true
        type: string

# id-token: write is required for OIDC trusted publishing. When this workflow is
# called by deps-update.yml, the effective token is bounded by the caller's grant.
permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

env:
  MISE_ENV: ci

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # On a tag push / dispatch, inputs.ref is empty and this falls back to the
      # triggering ref. When called by deps-update.yml, it is the freshly pushed
      # release tag, so we publish that exact commit.
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up mise (node + pnpm, ci env)
        uses: jdx/mise-action@v4

      # Only meaningful for a direct tag push; dispatch/called runs skip it.
      - name: Verify the tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi
          echo "Releasing @askviraj/ai-plugins@$pkg"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Security gate: osv-scanner exits non-zero if the locked dependencies
      # include any known-vulnerable package, blocking the publish. If a fix
      # isn't yet available, add an osv-scanner.toml ignore or a pnpm override.
      - name: Security-scan the dependencies (osv-scanner)
        run: osv-scanner scan source --lockfile=pnpm-lock.yaml

      - name: Run tests
        run: mise run i:test

      - name: Verify the publishable package
        run: mise run i:build

      # OIDC trusted publishing needs npm >= 11.5.1; the node-bundled npm may lag.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      # Idempotent: skip (don't fail) if this version is already on npm, so tag
      # re-points, dispatch retries, and re-runs are safe no-ops.
      - name: Publish to npm (OIDC trusted publishing + provenance)
        run: |
          ver="$(node -p "require('./package.json').version")"
          if npm view "@askviraj/ai-plugins@$ver" version >/dev/null 2>&1; then
            echo "@askviraj/ai-plugins@$ver is already published — skipping."
            exit 0
          fi
          npm publish --access public
