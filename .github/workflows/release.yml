name: Release

# Publishes @askviraj/ai-plugins to npm when a version tag is pushed.
# Auth is OIDC "trusted publishing" (no stored token) — npm verifies this repo +
# workflow's GitHub identity and adds provenance automatically. One-time setup:
# on npmjs.com, add this repo and `release.yml` as a Trusted Publisher for the
# package. To release: bump the version, then push a matching tag (e.g. v1.2.0).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# id-token: write is required for OIDC trusted publishing.
permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  MISE_ENV: ci

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # mise GPG-verifies the Node tarball (settings.node.gpg_verify). On a fresh
      # runner the gpg keyring isn't initialized, so seed it with Node's official
      # release signing keys before mise runs — otherwise `mise install` aborts
      # with "gpg failed / no valid OpenPGP data found".
      - name: Import Node.js release signing keys (mise gpg verification)
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 https://github.com/nodejs/release-keys.git "$tmp"
          gpg --batch --import "$tmp"/keys/*.asc

      - name: Set up mise (node + pnpm, ci env)
        uses: jdx/mise-action@v4

      # Only meaningful for tag pushes; a manual workflow_dispatch run has no tag.
      - name: Verify the tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi
          echo "Releasing @askviraj/ai-plugins@$pkg"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Security gate: osv-scanner exits non-zero if the locked dependencies
      # include any known-vulnerable package, blocking the publish. If a fix
      # isn't yet available, add an osv-scanner.toml ignore or a pnpm override.
      - name: Security-scan the dependencies (osv-scanner)
        run: osv-scanner scan source --lockfile=pnpm-lock.yaml

      - name: Run tests
        run: mise run i:test

      - name: Verify the publishable package
        run: mise run i:build

      # OIDC trusted publishing needs npm >= 11.5.1; the node-bundled npm may lag.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm (OIDC trusted publishing + provenance)
        run: npm publish --access public
