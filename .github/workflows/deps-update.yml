name: Monthly dependency update & release

# Once a month: refresh pnpm dependencies (bounded by the minimumReleaseAge
# cooldown in pnpm-workspace.yaml), security-scan them, cut a patch release, and
# publish to npm. The refreshed lockfile + version bump are committed to main and
# tagged. If nothing changed, it does nothing.
#
# Publishing is delegated to release.yml via `workflow_call` (not an inline
# `npm publish`): npm allows only ONE Trusted Publisher per package, and OIDC's
# job_workflow_ref resolves to release.yml even when called from here — so the
# single release.yml Trusted Publisher authorizes this path too. (A tag pushed
# with the workflow's GITHUB_TOKEN would not trigger release.yml on its own, so we
# call it directly rather than relying on the tag-push event.)
on:
  schedule:
    - cron: "0 2 1 * *" # 02:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write # commit + push the refresh, version bump, and tag
  id-token: write # passed through to release.yml for OIDC publishing

concurrency:
  group: deps-update
  cancel-in-progress: false

env:
  MISE_ENV: ci

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up mise (node + pnpm, ci env)
        uses: jdx/mise-action@v4

      - name: Update dependencies (respects the minimumReleaseAge cooldown)
        run: pnpm update

      - name: Check whether anything changed
        id: changed
        run: |
          if git diff --quiet -- pnpm-lock.yaml package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes this month — nothing to release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Security gate: osv-scanner exits non-zero if the refreshed lockfile pulls
      # in any known-vulnerable package, failing the run BEFORE anything is pushed.
      # If a fix isn't yet available, add an osv-scanner.toml ignore or a pnpm
      # override.
      - name: Security-scan the updated dependencies (osv-scanner)
        if: steps.changed.outputs.changed == 'true'
        run: osv-scanner scan source --lockfile=pnpm-lock.yaml

      - name: Cut a patch release (tests, version bump, commit, tag)
        id: release
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml package.json
          git commit -m "ops(deps): monthly dependency refresh"
          mise run i:release # clean tree now → i:test, patch bump, commit, tag
          tag="v$(node -p "require('./package.json').version")"
          git push origin HEAD:main
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  # Delegate the actual npm publish to release.yml so OIDC's job_workflow_ref
  # matches the single Trusted Publisher. Checks out and publishes the tag the
  # update job just pushed.
  publish:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/release.yml
    permissions:
      contents: read
      id-token: write
    with:
      ref: ${{ needs.update.outputs.tag }}
