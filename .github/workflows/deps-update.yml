name: Monthly dependency update & release

# Once a month: refresh pnpm dependencies (bounded by the minimumReleaseAge
# cooldown in pnpm-workspace.yaml), security-scan them, then cut a patch release
# and publish it to npm. The refreshed lockfile + version bump are committed to
# main and tagged. If nothing changed, it does nothing.
#
# Publishing happens INLINE here, not via release.yml: a tag pushed with the
# workflow's GITHUB_TOKEN does not trigger another workflow, so this job performs
# the OIDC publish itself.
on:
  schedule:
    - cron: "0 2 1 * *" # 02:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write # commit + push the refresh, version bump, and tag
  id-token: write # OIDC trusted publishing to npm

concurrency:
  group: deps-update
  cancel-in-progress: false

env:
  MISE_ENV: ci

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # mise GPG-verifies the Node tarball (settings.node.gpg_verify). On a fresh
      # runner the gpg keyring isn't initialized, so seed it with Node's official
      # release signing keys before mise runs — otherwise `mise install` aborts
      # with "gpg failed / no valid OpenPGP data found".
      - name: Import Node.js release signing keys (mise gpg verification)
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 https://github.com/nodejs/release-keys.git "$tmp"
          gpg --batch --import "$tmp"/keys/*.asc

      - name: Set up mise (node + pnpm, ci env)
        uses: jdx/mise-action@v4

      - name: Update dependencies (respects the minimumReleaseAge cooldown)
        run: pnpm update

      - name: Check whether anything changed
        id: changed
        run: |
          if git diff --quiet -- pnpm-lock.yaml package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes this month — nothing to release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Security gate: osv-scanner exits non-zero if the refreshed lockfile pulls
      # in any known-vulnerable package, blocking the release. If a fix isn't yet
      # available, add an osv-scanner.toml ignore or a pnpm override.
      - name: Security-scan the updated dependencies (osv-scanner)
        if: steps.changed.outputs.changed == 'true'
        run: osv-scanner scan source --lockfile=pnpm-lock.yaml

      - name: Cut a patch release (tests, version bump, commit, tag)
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml package.json
          git commit -m "ops(deps): monthly dependency refresh"
          mise run i:release # clean tree now → i:test, patch bump, commit, tag
          tag="v$(node -p "require('./package.json').version")"
          git push origin HEAD:main
          git push origin "$tag"

      # OIDC trusted publishing needs npm >= 11.5.1; the node-bundled npm may lag.
      - name: Ensure npm supports OIDC trusted publishing
        if: steps.changed.outputs.changed == 'true'
        run: npm install -g npm@latest

      - name: Verify the publishable package
        if: steps.changed.outputs.changed == 'true'
        run: mise run i:build

      - name: Publish to npm (OIDC trusted publishing + provenance)
        if: steps.changed.outputs.changed == 'true'
        run: npm publish --access public
